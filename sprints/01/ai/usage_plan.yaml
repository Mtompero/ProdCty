goals:
  - "Piackutatási cikkek gyors összefoglalása a közösségi audio platformok és producerek trendjeiről."
  - "Nyitott interjúkérdés sablonok generálása különböző felhasználói szegmensekhez (pl. feltörekvő producerek, zenészek)."
  - "Versenytárs-összehasonlítás (Splice, BandLab, Tracklib)."
operational_cadence:
  check_in: "Heti két alkalommal értékelem az MI-eszközök által adott javaslatokat és kutatási összefoglalókat."
  review_partner: "A konzulenssel sprintenként egyszer átbeszélem az MI által generált artefaktumokat."
guardrails:
  - "Személyes azonosító adatot nem továbbítok külső MI eszköz felé."
  - "Minden generált tartalmat manuálisan ellenőrzök a felhasználás előtt."
  - "Érzékeny interjúrészleteket anonimizálok, mielőtt MI-vel elemeztetem."
tools:
  - name: "ChatGPT"
    use_cases: ["Piackutatási cikkek összegzése", "Interjúkérdés sablonok generálása", "Versenytársak összehasonlítása és leírás finomhangolása"]
