<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ProdCty | Login</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="auth-page">
  <header class="site-header">
    <div class="brand">
      <span class="dot"></span>
      <div>
        <div class="brand-name">ProdCty</div>
        <div class="brand-sub">sign in to upload, comment and rate</div>
      </div>
    </div>
    <nav class="main-nav">
      <a href="./index.html">Library</a>
      <a href="./social.html">Community</a>
      <a href="./demos.html">Demos</a>
    </nav>
  </header>

  <main class="page-shell auth-shell">
    <section class="hero compact auth-hero">
      <div>
        <p class="eyebrow">Authentication</p>
        <h1>Create an account or sign in.</h1>
        <p class="hero-copy">Logged-in users can upload audio, post comments and rate demos across the app.</p>
      </div>
    </section>

    <section class="auth-grid">
      <section class="panel auth-panel">
        <div class="panel-header">
          <h2>Register</h2>
        </div>
        <form id="registerForm" class="stack-form">
          <label>Username<input name="username" required /></label>
          <label>Email<input name="email" type="email" required /></label>
          <label>Password<input name="password" type="password" required /></label>
          <label>Interests<input name="interests" placeholder="lofi, house, rock" /></label>
          <button class="btn primary" type="submit">Create account</button>
          <div id="registerMsg" class="msg"></div>
        </form>
      </section>

      <section class="panel auth-panel">
        <div class="panel-header">
          <h2>Login</h2>
          <p class="muted">After a successful login you will be sent back into the app.</p>
        </div>
        <form id="loginForm" class="stack-form">
          <label>Email<input name="email" type="email" required /></label>
          <label>Password<input name="password" type="password" required /></label>
          <button class="btn primary" type="submit">Login</button>
          <div id="loginMsg" class="msg"></div>
        </form>
      </section>
    </section>
  </main>

  <script src="./auth.js"></script>
</body>
</html>
